<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>big orange</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: 'Segoe UI', sans-serif; color: white; user-select: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; font-size: 2rem; color: #ff8800; font-weight: bold; text-shadow: 0 0 10px #ff8800; }
        #menu, #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        h1 { font-size: 4rem; color: #ff8800; margin: 0 0 10px 0; text-shadow: 0 0 20px #ff8800; text-transform: uppercase; }
        p { color: #cbd5e1; font-size: 1.2rem; margin-bottom: 30px; text-align: center; max-width: 600px; line-height: 1.5; }
        .highlight { color: #f97316; font-weight: bold; }
        button { background: #ff8800; color: #0f172a; border: none; padding: 15px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px #ff8800; transition: transform 0.1s; }
        button:hover { transform: scale(1.05); }
        #game-over { display: none; }
        #attack-name { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 1.5rem; color: #facc15; font-weight: bold; text-shadow: 0 0 10px #facc15; opacity: 0; transition: opacity 0.3s; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="ui">SCORE: <span id="score-val">0</span></div>
    <div id="attack-name">ATTACK INCOMING</div>

    <div id="menu">
        <h1>big orange</h1>
        <p>You are an Orange. The Boss is an Orange.<br>
        Use <span class="highlight">W / A / S / D</span> or <span class="highlight">ARROWS</span> to move.<br>
        <span class="highlight">W</span> fires your jetpack to fight gravity. Survive all 20 attacks.</p>
        <button id="start-btn">ENGAGE</button>
    </div>

    <div id="game-over">
        <h1 style="color: #ef4444; text-shadow: 0 0 20px #ef4444;">JUICED</h1>
        <p>Final Score: <span id="final-score" class="highlight">0</span></p>
        <button onclick="location.reload()">RETRY</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-val');
        const finalScoreEl = document.getElementById('final-score');
        const attackNameEl = document.getElementById('attack-name');
        
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; boss.x = canvas.width/2; boss.y = canvas.height/2; }
        window.addEventListener('resize', resize);

        let isPlaying = false, frame = 0, score = 0, attackTimer = 100;
        const keys = { w: false, a: false, s: false, d: false };

        window.addEventListener('keydown', e => {
            let k = e.key.toLowerCase();
            if (k==='w' || k==='arrowup') keys.w = true;
            if (k==='s' || k==='arrowdown') keys.s = true;
            if (k==='a' || k==='arrowleft') keys.a = true;
            if (k==='d' || k==='arrowright') keys.d = true;
        });
        window.addEventListener('keyup', e => {
            let k = e.key.toLowerCase();
            if (k==='w' || k==='arrowup') keys.w = false;
            if (k==='s' || k==='arrowdown') keys.s = false;
            if (k==='a' || k==='arrowleft') keys.a = false;
            if (k==='d' || k==='arrowright') keys.d = false;
        });

        const player = { x: 200, y: 200, r: 12, vx: 0, vy: 0, speed: 0.8, friction: 0.92, gravity: 0.4, thrust: -0.9, color: '#f97316' };
        const boss = { x: 0, y: 0, r: 60, color: '#ea580c', angle: 0 };
        
        let projs = []; // Moving hazards
        let zones = []; // Lasers, nukes, static hazards
        let particles = [];

        resize();

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('menu').style.display = 'none';
            player.x = canvas.width/4; player.y = canvas.height/2;
            isPlaying = true;
            gameLoop();
        });

        function die() {
            isPlaying = false;
            document.getElementById('game-over').style.display = 'flex';
            finalScoreEl.innerText = score;
        }

        function spawnProj(x, y, vx, vy, r, type='normal', extra={}) {
            projs.push({ x, y, vx, vy, r, type, ...extra });
        }
        function spawnZone(type, extra={}) {
            zones.push({ type, timer: 60, state: 'warn', ...extra });
        }

        function displayAttack(name) {
            attackNameEl.innerText = name;
            attackNameEl.style.opacity = 1;
            setTimeout(() => attackNameEl.style.opacity = 0, 2000);
        }

        function triggerAttack() {
            score++; scoreEl.innerText = score;
            let type = Math.floor(Math.random() * 20) + 1; // 1 to 20
            let cx = canvas.width/2; let cy = canvas.height/2;

            switch(type) {
                case 1: // 8-Way Spinning Lasers
                    displayAttack("Spinning Core");
                    spawnZone('spinLasers', { angle: 0, speed: 0.02, life: 300 });
                    break;
                case 2: // Asteroids
                    displayAttack("Asteroid Field");
                    for(let i=0; i<8; i++) {
                        let edgeX = Math.random() < 0.5 ? 0 : canvas.width;
                        let edgeY = Math.random() * canvas.height;
                        let tx = player.x + (Math.random()*200-100);
                        let ty = player.y + (Math.random()*200-100);
                        let a = Math.atan2(ty - edgeY, tx - edgeX);
                        spawnProj(edgeX, edgeY, Math.cos(a)*6, Math.sin(a)*6, 20, 'asteroid');
                    }
                    break;
                case 3: // H/V Random Lasers
                    displayAttack("Grid Lock");
                    for(let i=0; i<4; i++) {
                        if(Math.random()>0.5) spawnZone('hvLaser', { isH: true, y: Math.random()*canvas.height, h: 40 });
                        else spawnZone('hvLaser', { isH: false, x: Math.random()*canvas.width, w: 40 });
                    }
                    break;
                case 4: // Orange Nuke
                    displayAttack("Citrus Nuke");
                    spawnZone('nuke', { x: cx, y: cy, r: canvas.height*0.4 });
                    break;
                case 5: // Homing Missiles
                    displayAttack("Seekers");
                    for(let i=0; i<3; i++) spawnProj(cx, cy, (Math.random()-0.5)*10, (Math.random()-0.5)*10, 8, 'homing', { life: 200 });
                    break;
                case 6: // Bouncy Oranges
                    displayAttack("Bouncers");
                    for(let i=0; i<5; i++) spawnProj(cx, cy, (Math.random()-0.5)*15, (Math.random()-0.5)*15, 15, 'bouncy', { bounces: 4 });
                    break;
                case 7: // Nova
                    displayAttack("Supernova");
                    for(let i=0; i<20; i++) { let a = (i/20)*Math.PI*2; spawnProj(cx, cy, Math.cos(a)*5, Math.sin(a)*5, 10); }
                    break;
                case 8: // Wall of Doom
                    displayAttack("The Wall");
                    let gap = Math.random() * (canvas.height - 200) + 100;
                    for(let y=0; y<canvas.height; y+=30) {
                        if(Math.abs(y-gap)>80) spawnProj(0, y, 7, 0, 12);
                    }
                    break;
                case 9: // Minefield
                    displayAttack("Minefield");
                    for(let i=0; i<6; i++) spawnZone('mine', { x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: 80 });
                    break;
                case 10: // Sniper
                    displayAttack("Sniper Lock");
                    spawnZone('sniper', { tx: player.x, ty: player.y });
                    break;
                case 11: // Crossfire
                    displayAttack("Crossfire");
                    spawnZone('cross', { life: 100 });
                    break;
                case 12: // Falling Juice
                    displayAttack("Acid Rain");
                    for(let i=0; i<15; i++) spawnProj(Math.random()*canvas.width, -50, 0, 8+Math.random()*4, 6);
                    break;
                case 13: // Sine Wave
                    displayAttack("Wobblers");
                    for(let i=0; i<10; i++) spawnProj(0, Math.random()*canvas.height, 5+Math.random()*3, 0, 8, 'sine', { startY: Math.random()*canvas.height, offset: Math.random()*Math.PI*2 });
                    break;
                case 14: // Shotgun
                    displayAttack("Shotgun");
                    let baseA = Math.atan2(player.y-cy, player.x-cx);
                    for(let i=0; i<12; i++) {
                        let spread = baseA + (Math.random()-0.5)*0.8;
                        let spd = 6 + Math.random()*8;
                        spawnProj(cx, cy, Math.cos(spread)*spd, Math.sin(spread)*spd, 7);
                    }
                    break;
                case 15: // Lava Floor
                    displayAttack("Lava Floor");
                    spawnZone('lava', { y: canvas.height - 150, h: 150, life: 180 });
                    break;
                case 16: // Spiral
                    displayAttack("Spiral Core");
                    spawnZone('spiral', { angle: 0, life: 150 });
                    break;
                case 17: // Orbiting Shields
                    displayAttack("Orbital Strike");
                    for(let i=0; i<8; i++) spawnProj(cx, cy, 0, 0, 12, 'orbit', { angle: (i/8)*Math.PI*2, dist: boss.r, speed: 0.05, expand: 2 });
                    break;
                case 18: // Shrapnel
                    displayAttack("Shrapnel");
                    let px = player.x + (Math.random()*200-100); let py = player.y-200;
                    spawnProj(cx, cy, (px-cx)*0.05, (py-cy)*0.05, 18, 'shrapnel', { timer: 30 });
                    break;
                case 19: // Gravity Well (Black Hole)
                    displayAttack("Vortex");
                    spawnZone('blackhole', { x: Math.random()*canvas.width, y: Math.random()*canvas.height, life: 200 });
                    break;
                case 20: // The Blender
                    displayAttack("The Blender");
                    spawnZone('blender', { angle: 0, life: 200 });
                    break;
            }
        }

        function update() {
            // Player Physics (Jetpack)
            if (keys.w) { player.vy += player.thrust; createExhaust(); }
            if (keys.s) player.vy -= player.thrust * 0.5; // push down slightly
            if (keys.a) player.vx -= player.speed;
            if (keys.d) player.vx += player.speed;

            player.vy += player.gravity;
            player.vx *= player.friction;
            player.vy *= player.friction;
            
            player.x += player.vx;
            player.y += player.vy;

            // Boundaries
            if (player.x < player.r) { player.x = player.r; player.vx = 0; }
            if (player.x > canvas.width - player.r) { player.x = canvas.width - player.r; player.vx = 0; }
            if (player.y < player.r) { player.y = player.r; player.vy = 0; }
            if (player.y > canvas.height - player.r) { player.y = canvas.height - player.r; player.vy = 0; }

            // Boss Hitbox (Instant death touching the boss)
            if (Math.hypot(player.x - boss.x, player.y - boss.y) < player.r + boss.r) die();
            boss.angle += 0.01;

            // Game Loop Timers
            attackTimer--;
            if (attackTimer <= 0) {
                triggerAttack();
                attackTimer = Math.max(50, 150 - (score * 2)); // Gets faster over time
            }

            // Update Projectiles
            for (let i = projs.length - 1; i >= 0; i--) {
                let p = projs[i];
                if (p.type === 'sine') {
                    p.x += p.vx; p.y = p.startY + Math.sin((frame * 0.1) + p.offset) * 100;
                } else if (p.type === 'homing') {
                    let a = Math.atan2(player.y - p.y, player.x - p.x);
                    p.vx += Math.cos(a) * 0.3; p.vy += Math.sin(a) * 0.3;
                    p.vx *= 0.95; p.vy *= 0.95;
                    p.x += p.vx; p.y += p.vy;
                    p.life--; if(p.life <= 0) projs.splice(i, 1);
                } else if (p.type === 'orbit') {
                    p.angle += p.speed; p.dist += p.expand;
                    p.x = boss.x + Math.cos(p.angle) * p.dist;
                    p.y = boss.y + Math.sin(p.angle) * p.dist;
                    if (p.dist > canvas.width) projs.splice(i, 1);
                } else if (p.type === 'bouncy') {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > canvas.width) { p.vx *= -1; p.bounces--; }
                    if (p.y < 0 || p.y > canvas.height) { p.vy *= -1; p.bounces--; }
                    if (p.bounces <= 0) projs.splice(i, 1);
                } else if (p.type === 'shrapnel') {
                    p.x += p.vx; p.y += p.vy; p.timer--;
                    if(p.timer <= 0) {
                        for(let j=0; j<8; j++) {
                            let a = (j/8)*Math.PI*2;
                            spawnProj(p.x, p.y, Math.cos(a)*8, Math.sin(a)*8, 6);
                        }
                        projs.splice(i, 1);
                    }
                } else {
                    // Normal straight movement
                    p.x += p.vx; p.y += p.vy;
                }

                if (Math.hypot(player.x - p.x, player.y - p.y) < player.r + p.r) die();
                
                // Cleanup offscreen (unless bouncy)
                if (p.type !== 'bouncy' && (p.x < -100 || p.x > canvas.width + 100 || p.y < -100 || p.y > canvas.height + 100)) projs.splice(i, 1);
            }

            // Update Zones & Complex Attacks
            for (let i = zones.length - 1; i >= 0; i--) {
                let z = zones[i];
                z.timer--;

                if (z.type === 'spinLasers') {
                    z.life--; z.angle += z.speed;
                    if(z.life <= 0) { zones.splice(i, 1); continue; }
                    if(z.timer <= 0) { // Active
                        for(let j=0; j<8; j++) {
                            let a = z.angle + (j/8)*Math.PI*2;
                            let p2x = boss.x + Math.cos(a)*2000; let p2y = boss.y + Math.sin(a)*2000;
                            if (distToSegment({x:player.x,y:player.y}, {x:boss.x,y:boss.y}, {x:p2x,y:p2y}) < 15 + player.r) die();
                        }
                    }
                } else if (z.type === 'hvLaser') {
                    if (z.timer <= 0) {
                        z.timer = 15; z.state = 'active'; z.type = 'killZone';
                        if (z.isH) z.rect = { x: 0, y: z.y-z.h/2, w: canvas.width, h: z.h };
                        else z.rect = { x: z.x-z.w/2, y: 0, w: z.w, h: canvas.height };
                    }
                } else if (z.type === 'nuke' || z.type === 'mine') {
                    if (z.timer <= 0) {
                        if(Math.hypot(player.x - z.x, player.y - z.y) < z.r + player.r) die();
                        z.state = 'explode'; z.timer = 10; z.type = 'killZone';
                    }
                } else if (z.type === 'sniper') {
                    if (z.timer <= 0) {
                        let a = Math.atan2(z.ty - boss.y, z.tx - boss.x);
                        spawnProj(boss.x, boss.y, Math.cos(a)*30, Math.sin(a)*30, 10);
                        zones.splice(i, 1);
                    }
                } else if (z.type === 'cross') {
                    z.life--; if(z.life <= 0) zones.splice(i, 1);
                    if(z.timer <= 0) {
                        let lines = [
                            [{x:0,y:0}, {x:canvas.width,y:canvas.height}],
                            [{x:canvas.width,y:0}, {x:0,y:canvas.height}]
                        ];
                        lines.forEach(l => { if (distToSegment(player, l[0], l[1]) < 20) die(); });
                    }
                } else if (z.type === 'lava') {
                    z.life--; if(z.life <= 0) zones.splice(i, 1);
                    if(z.timer <= 0 && player.y > z.y) die();
                } else if (z.type === 'spiral') {
                    z.life--; if(z.life <= 0) zones.splice(i, 1);
                    if(frame % 3 === 0) {
                        z.angle += 0.3; spawnProj(boss.x, boss.y, Math.cos(z.angle)*8, Math.sin(z.angle)*8, 8);
                    }
                } else if (z.type === 'blackhole') {
                    z.life--; if(z.life <= 0) zones.splice(i, 1);
                    if (z.timer <= 0) {
                        let d = Math.hypot(z.x-player.x, z.y-player.y);
                        if (d < 30) die(); // Event horizon
                        player.vx += ((z.x-player.x)/d) * 0.8; player.vy += ((z.y-player.y)/d) * 0.8;
                    }
                } else if (z.type === 'blender') {
                    z.life--; z.angle += 0.05; if(z.life <= 0) zones.splice(i, 1);
                    if (z.timer <= 0) {
                        let p1x = boss.x + Math.cos(z.angle)*2000; let p1y = boss.y + Math.sin(z.angle)*2000;
                        let p2x = boss.x + Math.cos(z.angle+Math.PI)*2000; let p2y = boss.y + Math.sin(z.angle+Math.PI)*2000;
                        if (distToSegment(player, boss, {x:p1x,y:p1y}) < 30 || distToSegment(player, boss, {x:p2x,y:p2y}) < 30) die();
                    }
                } else if (z.type === 'killZone') {
                    z.timer--; if (z.timer <= 0) zones.splice(i, 1);
                    else if (z.rect && player.x>z.rect.x && player.x<z.rect.x+z.rect.w && player.y>z.rect.y && player.y<z.rect.y+z.rect.h) die();
                }
            }

            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i]; p.x+=p.vx; p.y+=p.vy; p.life-=0.05; p.r*=0.9;
                if(p.life<=0) particles.splice(i,1);
            }
            frame++;
        }

        function draw() {
            ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Particles
            for(let p of particles) {
                ctx.fillStyle = `rgba(255, 136, 0, ${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
            }

            // Zones & Lasers
            for (let z of zones) {
                if (z.type === 'spinLasers' || z.type === 'cross' || z.type === 'blender') {
                    ctx.strokeStyle = z.timer>0 ? 'rgba(255,136,0,0.2)' : '#ef4444';
                    ctx.lineWidth = z.timer>0 ? 4 : (z.type==='blender'?60:30);
                    ctx.beginPath();
                    if (z.type === 'spinLasers') {
                        for(let j=0; j<8; j++) {
                            let a = z.angle + (j/8)*Math.PI*2;
                            ctx.moveTo(boss.x, boss.y); ctx.lineTo(boss.x+Math.cos(a)*2000, boss.y+Math.sin(a)*2000);
                        }
                    } else if (z.type === 'cross') {
                        ctx.moveTo(0,0); ctx.lineTo(canvas.width, canvas.height);
                        ctx.moveTo(canvas.width,0); ctx.lineTo(0, canvas.height);
                    } else if (z.type === 'blender') {
                        ctx.moveTo(boss.x, boss.y); ctx.lineTo(boss.x+Math.cos(z.angle)*2000, boss.y+Math.sin(z.angle)*2000);
                        ctx.moveTo(boss.x, boss.y); ctx.lineTo(boss.x+Math.cos(z.angle+Math.PI)*2000, boss.y+Math.sin(z.angle+Math.PI)*2000);
                    }
                    ctx.stroke();
                } else if (z.type === 'hvLaser') {
                    ctx.fillStyle = z.timer>0 ? 'rgba(255,136,0,0.2)' : '#ef4444';
                    if (z.isH) ctx.fillRect(0, z.y-z.h/2, canvas.width, z.h);
                    else ctx.fillRect(z.x-z.w/2, 0, z.w, canvas.height);
                } else if (z.type === 'nuke' || z.type === 'mine') {
                    ctx.fillStyle = z.state==='explode' ? '#ef4444' : 'rgba(234,88,12,0.2)';
                    ctx.beginPath(); ctx.arc(z.x, z.y, z.r, 0, Math.PI*2); ctx.fill();
                    if(z.state!=='explode') { ctx.strokeStyle='#ea580c'; ctx.stroke(); }
                } else if (z.type === 'sniper') {
                    ctx.strokeStyle = 'rgba(239,68,68,0.5)'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(boss.x, boss.y); ctx.lineTo(z.tx, z.ty); ctx.stroke();
                } else if (z.type === 'lava') {
                    ctx.fillStyle = z.timer>0 ? 'rgba(239,68,68,0.2)' : 'rgba(239,68,68,0.8)';
                    ctx.fillRect(0, z.y, canvas.width, z.h);
                } else if (z.type === 'blackhole') {
                    ctx.fillStyle = z.timer>0 ? 'rgba(147,51,234,0.3)' : '#9333ea';
                    ctx.beginPath(); ctx.arc(z.x, z.y, 40 + Math.sin(frame*0.2)*10, 0, Math.PI*2); ctx.fill();
                }
            }

            // Boss
            ctx.fillStyle = boss.color;
            ctx.beginPath(); ctx.arc(boss.x, boss.y, boss.r, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#0f172a'; // Texture dots on boss
            for(let i=0; i<6; i++) {
                let a = boss.angle + (i/6)*Math.PI*2;
                ctx.beginPath(); ctx.arc(boss.x+Math.cos(a)*(boss.r-15), boss.y+Math.sin(a)*(boss.r-15), 6, 0, Math.PI*2); ctx.fill();
            }

            // Projectiles
            ctx.fillStyle = '#facc15';
            for (let p of projs) {
                if (p.type === 'asteroid') ctx.fillStyle = '#c2410c';
                else if (p.type === 'homing') ctx.fillStyle = '#ef4444';
                else if (p.type === 'bouncy') ctx.fillStyle = '#a855f7';
                else ctx.fillStyle = '#facc15';
                
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
            }

            // Player
            ctx.fillStyle = player.color;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
        }

        function createExhaust() {
            particles.push({ x: player.x + (Math.random()*10-5), y: player.y + player.r + Math.random()*5, vx: (Math.random()-0.5), vy: 2 + Math.random()*2, r: 4 + Math.random()*3, life: 1 });
        }

        // Math helper for laser collision (Line segment distance)
        function distToSegment(p, v, w) {
            let l2 = (v.x - w.x)**2 + (v.y - w.y)**2;
            if (l2 == 0) return Math.hypot(p.x - v.x, p.y - v.y);
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
        }

        function gameLoop() {
            if (isPlaying) { update(); draw(); requestAnimationFrame(gameLoop); }
        }
    </script>
</body>
</html>
