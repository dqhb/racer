<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100-Level Boss Run</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; user-select: none; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; box-sizing: border-box; text-transform: uppercase; }
        #top-bar { display: flex; justify-content: space-between; align-items: flex-start; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        h1 { margin: 0; font-size: 2.5rem; color: #ff8800; letter-spacing: 2px; text-shadow: 0 0 20px #ff8800;}
        #level-display { font-size: 1.5rem; color: #facc15; text-shadow: 0 0 10px #facc15;}
        #menu, #victory { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; z-index: 10; }
        #menu h2, #victory h2 { font-size: 4rem; color: #ff8800; margin: 0 0 20px 0; text-shadow: 0 0 20px #ff8800; text-align: center; }
        #victory h2 { color: #4ade80; text-shadow: 0 0 30px #4ade80; font-size: 3rem; }
        p { color: #94a3b8; font-size: 1.2rem; margin-bottom: 30px; letter-spacing: 1px; text-align: center;}
        .controls-text { color: #fff; font-weight: bold; }
        button { background: #ff8800; color: #0f172a; border: none; padding: 15px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px #ff8800; transition: transform 0.1s; }
        button:hover { transform: scale(1.05); background: #ffaa33; }
        #victory { display: none; z-index: 20; }
        #boss-alert { font-size: 2rem; color: #ef4444; font-weight: bold; text-shadow: 0 0 15px #ef4444; text-align: center; opacity: 0; transition: opacity 0.5s;}
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="top-bar">
            <h1>Citrus Doom</h1>
            <div style="display:flex; flex-direction:column; align-items:flex-end;">
                <div id="level-display">JUMPS: 2 &nbsp;|&nbsp; LEVEL 1 / 100</div>
                <div id="boss-alert">WARNING</div>
            </div>
        </div>
    </div>

    <div id="menu">
        <h2>THE ORANGE WATCHES</h2>
        <p>
            <span class="controls-text">A / D / ARROWS</span> Move | <span class="controls-text">W / SPACE</span> Double Jump<br><br>
            Survive the 4 core attacks. Prepare for the Ascent.
        </p>
        <button id="start-btn">BEGIN RUN</button>
    </div>

    <div id="victory">
        <h2>THE ORANGE IS DEFEATED!</h2>
        <p>You survived the Final Ascent.</p>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const menu = document.getElementById('menu');
        const startBtn = document.getElementById('start-btn');
        const levelUI = document.getElementById('level-display');
        const bossAlert = document.getElementById('boss-alert');
        const victoryScreen = document.getElementById('victory');

        let isPlaying = false, animationId;

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const keys = { left: false, right: false };
        let jumpPressed = false; 

        window.addEventListener('keydown', e => { 
            let key = e.key.toLowerCase();
            if (key === 'a' || key === 'arrowleft') keys.left = true;
            if (key === 'd' || key === 'arrowright') keys.right = true;
            let isJumpKey = (e.code === 'Space' || e.key === ' ' || key === 'w' || key === 'arrowup');
            if (isJumpKey) {
                e.preventDefault(); 
                if (!jumpPressed && !player.dead && player.jumpsLeft > 0) {
                    player.vy = player.jumpPower; player.jumpsLeft--; jumpPressed = true;
                }
            }
        });
        window.addEventListener('keyup', e => { 
            let key = e.key.toLowerCase();
            if (key === 'a' || key === 'arrowleft') keys.left = false;
            if (key === 'd' || key === 'arrowright') keys.right = false;
            if (e.code === 'Space' || e.key === ' ' || key === 'w' || key === 'arrowup') jumpPressed = false; 
        });

        startBtn.addEventListener('click', () => {
            menu.style.display = 'none'; isPlaying = true; buildLevel(currentLevel); gameLoop();
        });

        let currentLevel = 1;
        let platforms = [], hazards = [], particles = [], bgOranges = [];
        let cameraX = 0, cameraY = 0, deathY = 0; 

        const player = {
            x: 0, y: 0, w: 24, h: 24, vx: 0, vy: 0,
            speed: 0.9, maxSpeed: 7, friction: 0.85,
            jumpPower: -12.5, gravity: 0.65, jumpsLeft: 2, maxJumps: 2, dead: false
        };

        function buildLevel(level) {
            platforms = []; hazards = []; particles = []; bgOranges = [];
            
            let curX = 100, curY = 0;
            let minX = -500, maxX = 500, minY = -500, maxY = 500;
            
            platforms.push({ x: curX, y: curY + 100, w: 200, h: 20, type: 'start', color: '#facc15' });
            
            player.x = curX + 50; player.y = curY; player.vx = 0; player.vy = 0;
            player.dead = false; player.jumpsLeft = player.maxJumps; jumpPressed = false; 

            let lowestY = curY + 100;
            let orangeShades = ['#ea580c', '#f97316', '#fdba74', '#c2410c'];

            if (level === 100) {
                // LEVEL 100: EXTRA LONG VERTICAL CLIMB
                let numJumps = 40; 
                bossAlert.innerText = "FINAL BOSS: THE ASCENT";
                bossAlert.style.opacity = '1';
                bossAlert.style.color = '#a855f7';

                for (let i = 0; i < numJumps; i++) {
                    let gapX = (Math.random() < 0.5 ? 1 : -1) * (80 + Math.random() * 80); 
                    let gapY = -140 - Math.random() * 40; 
                    
                    let platW = 60 + Math.random() * 40;
                    curX += gapX; curY += gapY;

                    if (curY < minY) minY = curY;
                    platforms.push({ x: curX, y: curY, w: platW, h: 20, type: 'normal', color: orangeShades[Math.floor(Math.random()*orangeShades.length)] });
                }
                platforms.push({ x: curX - 100, y: curY - 150, w: 300, h: 20, type: 'goal', color: '#4ade80' });
                deathY = lowestY + 600; 
            } else {
                // STANDARD LEVELS
                let numJumps = 12 + Math.floor(level * 0.2);
                
                if (level === 20) { bossAlert.innerText = "BOSS ROOM: LASERS ONLY"; bossAlert.style.opacity = '1'; bossAlert.style.color = '#ef4444';}
                else if (level === 40) { bossAlert.innerText = "BOSS ROOM: ASTEROIDS ONLY"; bossAlert.style.opacity = '1'; bossAlert.style.color = '#ef4444';}
                else if (level === 60) { bossAlert.innerText = "BOSS ROOM: BULLETS ONLY"; bossAlert.style.opacity = '1'; bossAlert.style.color = '#ef4444';}
                else if (level === 80) { bossAlert.innerText = "BOSS ROOM: FALLING SPIKES ONLY"; bossAlert.style.opacity = '1'; bossAlert.style.color = '#ef4444';}
                else { bossAlert.style.opacity = '0'; }

                for (let i = 0; i < numJumps; i++) {
                    let jumpPattern = Math.floor(Math.random() * 3);
                    let gapX, gapY, platW;

                    if (jumpPattern === 0) { gapX = (Math.random() < 0.5 ? 1 : -1) * (140 + Math.random() * 60); gapY = -120 - Math.random() * 40; } 
                    else if (jumpPattern === 1) { gapX = (Math.random() < 0.5 ? 1 : -1) * (200 + Math.random() * 60); gapY = (Math.random() * 60) - 30; } 
                    else { gapX = (Math.random() < 0.5 ? 1 : -1) * (150 + Math.random() * 60); gapY = 80 + Math.random() * 80; }

                    if (Math.abs(gapX) < 130) gapX = (gapX < 0 ? -130 : 130);
                    platW = 60 + Math.random() * 50;

                    curX += gapX; curY += gapY;
                    if (curY > lowestY) lowestY = curY;
                    if (curY < minY) minY = curY; if (curY > maxY) maxY = curY;
                    if (curX < minX) minX = curX; if (curX > maxX) maxX = curX;

                    platforms.push({ x: curX, y: curY, w: platW, h: 20, type: 'normal', color: orangeShades[Math.floor(Math.random()*orangeShades.length)] });
                }
                platforms.push({ x: curX + (Math.random()<0.5 ? 160 : -160), y: curY - 50, w: 200, h: 20, type: 'goal', color: '#4ade80' });
                deathY = lowestY + 600; 
            }
            
            minX -= 500; maxX += 500; minY -= 800; maxY += 800;
            for(let i = 0; i < 50; i++) bgOranges.push({ x: minX + Math.random()*(maxX-minX), y: minY + Math.random()*(maxY-minY), r: Math.random()*150+50, parallax: Math.random()*0.4+0.1 });
        }

        function createSplash(x, y) {
            for(let i=0; i<30; i++) particles.push({ x: x, y: y, vx: (Math.random()-0.5)*14, vy: (Math.random()-0.5)*14-4, size: Math.random()*6+2, life: 1.0 });
        }

        function die() {
            if (player.dead) return; player.dead = true;
            createSplash(player.x+player.w/2, player.y+player.h/2);
            setTimeout(() => buildLevel(currentLevel), 1000);
        }

        function spawnHazard(type) {
            // Type 0: Lasers, Type 1: Asteroids, Type 2: Bullets, Type 3: Falling Spikes
            if (type === 0) {
                let isHorizontal = Math.random() < 0.5;
                if (isHorizontal) hazards.push({ type: 0, isH: true, y: player.y+(Math.random()*600-300), w: 50, timer: 60, active: 15, state: 'warn' });
                else hazards.push({ type: 0, isH: false, x: player.x+(Math.random()*800-400), w: 50, timer: 60, active: 15, state: 'warn' });
            }
            else if (type === 1) hazards.push({ type: 1, x: player.x+(Math.random()*1200-600), y: player.y-800, vx: (Math.random()-0.5)*4, vy: 9+Math.random()*4, r: 16 });
            else if (type === 2) hazards.push({ type: 2, tx: 0, ty: 0, timer: 60, state: 'aim' }); 
            else if (type === 3) hazards.push({ type: 3, x: player.x+(Math.random()*600-300), y: player.y-700, vx: 0, vy: 14+Math.random()*6, w: 12, h: 60 });
        }

        function updateHazards() {
            if (player.dead) return; 

            let activeTypes = [0, 1, 2, 3];
            
            if (currentLevel === 20) activeTypes = [0];
            else if (currentLevel === 40) activeTypes = [1];
            else if (currentLevel === 60) activeTypes = [2];
            else if (currentLevel === 80) activeTypes = [3];
            
            let chance = 0.005 + (currentLevel*0.0001);
            if (currentLevel % 20 === 0 && currentLevel !== 100) chance *= 4; 
            if (currentLevel === 100) chance *= 6; 

            activeTypes.forEach(t => { if (Math.random() < chance) spawnHazard(t); });

            let px = player.x+player.w/2; let py = player.y+player.h/2;

            for (let i = hazards.length-1; i >= 0; i--) {
                let h = hazards[i]; let remove = false;
                
                if (h.type === 0) { // Lasers
                    if (h.state === 'warn') { h.timer--; if(h.timer<=0) h.state = 'active'; }
                    else {
                        h.active--; if(h.active<=0) remove = true;
                        else if (!h.isH && player.x < h.x+h.w && player.x+player.w > h.x) die();
                        else if (h.isH && player.y < h.y+h.w && player.y+player.h > h.y) die();
                    }
                } else if (h.type === 1) { // Asteroid
                    h.x+=h.vx; h.y+=h.vy; if (Math.hypot(h.x-px, h.y-py) < h.r+12) die();
                    for(let p of platforms) if(h.x>p.x && h.x<p.x+p.w && h.y+h.r>p.y && h.y-h.r<p.y+p.h) { remove=true; createSplash(h.x, h.y+h.r); break; }
                } else if (h.type === 2) { // Bullets (Sniper Aim)
                    if (h.state === 'aim') {
                        h.tx = px; h.ty = py; h.timer--; if(h.timer<=0) { h.state='lock'; h.timer=15; }
                    } else if (h.state === 'lock') {
                        h.timer--; if(h.timer<=0) {
                            h.state = 'bullet'; h.x = cameraX+canvas.width/2; h.y = cameraY+60; h.r = 10;
                            let d = Math.hypot(h.tx-h.x, h.ty-h.y);
                            h.vx = ((h.tx-h.x)/d)*35; h.vy = ((h.ty-h.y)/d)*35; 
                        }
                    } else if (h.state === 'bullet') {
                        h.x+=h.vx; h.y+=h.vy; if (Math.hypot(h.x-px, h.y-py) < h.r+12) die();
                        if (Math.abs(h.x-px)>2000 || Math.abs(h.y-py)>2000) remove = true;
                    }
                } else if (h.type === 3) { // Falling Spikes
                    h.x+=h.vx; h.y+=h.vy;
                    if (player.x < h.x+h.w && player.x+player.w > h.x && player.y < h.y+h.h && player.y+player.h > h.y) die();
                    for(let p of platforms) if(h.x>p.x && h.x<p.x+p.w && h.y+h.h>p.y && h.y<p.y+p.h) { remove=true; createSplash(h.x+h.w/2, p.y); break; }
                }
                if (remove) hazards.splice(i, 1);
            }
        }

        function updatePhysics() {
            for(let i = particles.length-1; i>=0; i--) {
                let p = particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.5; p.life-=0.02;
                if(p.life<=0) particles.splice(i,1);
            }

            if (player.dead) return; 

            if (keys.left) player.vx -= player.speed; if (keys.right) player.vx += player.speed;
            player.vx *= player.friction;
            player.vx = Math.max(-player.maxSpeed, Math.min(player.maxSpeed, player.vx));
            player.x += player.vx;

            for (let p of platforms) {
                if (player.x<p.x+p.w && player.x+player.w>p.x && player.y<p.y+p.h && player.y+player.h>p.y) {
                    if (player.vx>0) player.x=p.x-player.w; else if (player.vx<0) player.x=p.x+p.w;
                    player.vx = 0;
                }
            }

            player.vy += player.gravity; player.y += player.vy;

            for (let p of platforms) {
                if (player.x<p.x+p.w && player.x+player.w>p.x && player.y<p.y+p.h && player.y+player.h>p.y) {
                    if (player.vy>0) { 
                        player.y=p.y-player.h; player.vy=0; player.jumpsLeft=player.maxJumps; 
                        if (p.type === 'goal') {
                            currentLevel++;
                            if (currentLevel > 100) { isPlaying = false; victoryScreen.style.display = 'flex'; } 
                            else buildLevel(currentLevel);
                            return; 
                        }
                    } else if (player.vy<0) { player.y=p.y+p.h; player.vy=0; }
                }
            }
            if (player.y > deathY) die();
        }

        function draw() {
            ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            cameraX += ((player.x - canvas.width/2) - cameraX) * 0.1;
            cameraY += ((player.y - canvas.height/1.6) - cameraY) * 0.1;

            levelUI.innerHTML = `JUMPS: <span style="color: ${player.jumpsLeft>0?'#4ade80':'#ef4444'}">${player.jumpsLeft}</span> &nbsp;|&nbsp; LEVEL ${currentLevel} / 100`;

            // Background
            for (let o of bgOranges) { ctx.fillStyle = 'rgba(255,136,0,0.05)'; ctx.beginPath(); ctx.arc(o.x-(cameraX*o.parallax), o.y-(cameraY*o.parallax), o.r, 0, Math.PI*2); ctx.fill(); }

            // Boss Eye indicator for multiples of 20 and level 100
            if (currentLevel % 20 === 0) {
                ctx.fillStyle = '#ea580c'; ctx.beginPath(); ctx.arc(canvas.width/2, 0, 150, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#111'; let ex = (player.x-(cameraX+canvas.width/2))*0.05; 
                ctx.beginPath(); ctx.arc(canvas.width/2-40+ex, 60, 15, 0, Math.PI*2); ctx.arc(canvas.width/2+40+ex, 60, 15, 0, Math.PI*2); ctx.fill();
            }

            // Platforms
            for (let p of platforms) { ctx.fillStyle = p.color; ctx.fillRect(p.x-cameraX, p.y-cameraY, p.w, p.h); }

            // Hazards Drawer
            for (let h of hazards) {
                if (h.type === 0) { // Lasers
                    let sx = h.isH ? 0 : h.x-cameraX; let sy = h.isH ? h.y-cameraY : 0;
                    let w = h.isH ? canvas.width : h.w; let ht = h.isH ? h.w : canvas.height;
                    if (h.state === 'warn') {
                        ctx.fillStyle = 'rgba(251,146,60,0.15)'; ctx.fillRect(sx, sy, w, ht);
                        ctx.strokeStyle = 'rgba(251,146,60,0.6)'; ctx.strokeRect(sx, sy, w, ht);
                    } else if (h.state === 'active') { ctx.fillStyle = '#ff8800'; ctx.fillRect(sx, sy, w, ht); }
                } else if (h.type === 1) { // Asteroid
                    ctx.fillStyle = '#c2410c'; ctx.beginPath(); ctx.arc(h.x-cameraX, h.y-cameraY, h.r, 0, Math.PI*2); ctx.fill();
                } else if (h.type === 2) { // Sniper Bullets
                    if(h.state === 'aim' || h.state === 'lock') {
                        ctx.strokeStyle = h.state==='aim'?'rgba(239,68,68,0.3)':'rgba(239,68,68,0.9)'; ctx.lineWidth=h.state==='aim'?2:5;
                        ctx.beginPath(); ctx.moveTo(canvas.width/2, 60); ctx.lineTo(h.tx-cameraX, h.ty-cameraY); ctx.stroke();
                    } else if (h.state === 'bullet') {
                        ctx.fillStyle='#ef4444'; ctx.beginPath(); ctx.arc(h.x-cameraX, h.y-cameraY, h.r, 0, Math.PI*2); ctx.fill();
                    }
                } else if (h.type === 3) { // Falling Spikes
                    ctx.fillStyle='#cbd5e1'; 
                    ctx.beginPath(); ctx.moveTo(h.x-cameraX, h.y-cameraY); 
                    ctx.lineTo(h.x+h.w-cameraX, h.y-cameraY); 
                    ctx.lineTo(h.x+(h.w/2)-cameraX, h.y+h.h-cameraY); ctx.fill();
                }
            }

            // Splash Particles
            ctx.fillStyle = '#f97316'; 
            for(let p of particles) { ctx.globalAlpha=p.life; ctx.beginPath(); ctx.arc(p.x-cameraX, p.y-cameraY, p.size, 0, Math.PI*2); ctx.fill(); }
            ctx.globalAlpha = 1.0;

            // Player
            if (!player.dead) {
                ctx.fillStyle = '#38bdf8'; ctx.fillRect(player.x-cameraX, player.y-cameraY, player.w, player.h);
                if (player.jumpsLeft === 2) { ctx.fillStyle = '#bae6fd'; ctx.fillRect(player.x-cameraX+6, player.y-cameraY+6, player.w-12, player.h-12); }
                else if (player.jumpsLeft === 1) { ctx.fillStyle = '#fde047'; ctx.fillRect(player.x-cameraX+8, player.y-cameraY+8, player.w-16, player.h-16); }
            }
        }

        function gameLoop() { if(isPlaying){ updatePhysics(); updateHazards(); draw(); animationId=requestAnimationFrame(gameLoop); } }
    </script>
</body>
</html>
