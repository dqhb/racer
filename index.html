<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>racer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: white; text-shadow: 2px 2px 0 #000;
            pointer-events: none; z-index: 10;
        }
        h1 { margin: 0; font-size: 3rem; color: #ff8c00; text-transform: uppercase; }
        p { margin: 5px 0 0 0; font-size: 1.2rem; }
        #speedometer { font-size: 2rem; font-weight: bold; color: #00ff00; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>racer</h1>
        <p>WASD to Drive | Avoid the Rocks</p>
        <div id="speedometer">0 MPH</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. SETUP SCENE & CAMERA
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky Blue
        scene.fog = new THREE.Fog(0x87CEEB, 50, 300); // Fades the infinite horizon

        const camera = new THREE.Camera();
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 2. LIGHTING
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(100, 200, 50);
        sun.castShadow = true;
        scene.add(sun);

        // 3. THE TERRAIN (Grassy Plane)
        const groundGeo = new THREE.PlaneGeometry(2000, 2000);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x3b8e35 }); // Grass Green
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 4. THE CAR (Custom Low-Poly Build)
        const car = new THREE.Group();
        
        // Chassis (Red)
        const chassisMat = new THREE.MeshLambertMaterial({ color: 0xff2200 });
        const chassis = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 4), chassisMat);
        chassis.position.y = 0.5;
        chassis.castShadow = true;
        car.add(chassis);

        // Cabin (Dark Glass)
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.6, 2), new THREE.MeshLambertMaterial({ color: 0x222222 }));
        cabin.position.set(0, 1, -0.2);
        car.add(cabin);

        // Wheels (Black)
        const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16);
        const wheelMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
        const positions = [
            [-1.1, 0.4, 1.2], [1.1, 0.4, 1.2], // Front
            [-1.1, 0.4, -1.2], [1.1, 0.4, -1.2] // Rear
        ];
        
        positions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(...pos);
            car.add(wheel);
        });

        // Headlights (Yellow)
        const headlightGeo = new THREE.BoxGeometry(0.4, 0.2, 0.1);
        const headlightMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        const hl1 = new THREE.Mesh(headlightGeo, headlightMat);
        hl1.position.set(-0.6, 0.6, -2.05);
        const hl2 = new THREE.Mesh(headlightGeo, headlightMat);
        hl2.position.set(0.6, 0.6, -2.05);
        car.add(hl1);
        car.add(hl2);

        scene.add(car);

        // 5. HITBOXES (Obstacles / Rocks)
        const obstacles = [];
        const rockGeo = new THREE.DodecahedronGeometry(2);
        const rockMat = new THREE.MeshLambertMaterial({ color: 0x888888 });

        for (let i = 0; i < 150; i++) {
            const rock = new THREE.Mesh(rockGeo, rockMat);
            // Random placement, but keep center relatively clear
            let rx = (Math.random() - 0.5) * 1000;
            let rz = (Math.random() - 0.5) * 1000;
            if (Math.abs(rx) < 10 && Math.abs(rz) < 10) rx += 20; 

            rock.position.set(rx, 1, rz);
            rock.castShadow = true;
            scene.add(rock);
            obstacles.push(rock);
        }

        // 6. CAR PHYSICS & CONTROLS
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        let speed = 0;
        let steering = 0;
        const maxSpeed = 1.2;
        const acceleration = 0.02;
        const friction = 0.01;
        const uiSpeed = document.getElementById('speedometer');

        function updatePhysics() {
            // Gas / Brake
            if (keys.w) speed -= acceleration;
            if (keys.s) speed += acceleration;

            // Friction
            if (!keys.w && !keys.s) {
                if (speed < 0) speed += friction;
                if (speed > 0) speed -= friction;
                if (Math.abs(speed) < friction) speed = 0;
            }

            // Cap Speed
            speed = Math.max(-maxSpeed, Math.min(maxSpeed / 2, speed));

            // Steering (only steer if moving)
            if (Math.abs(speed) > 0.05) {
                const steerAmount = (speed < 0 ? 0.03 : -0.03); // Reverse steering fix
                if (keys.a) car.rotation.y += steerAmount;
                if (keys.d) car.rotation.y -= steerAmount;
            }

            // Move Car Forward (Three.js backward is forward for our model)
            car.translateZ(speed);

            // Update UI
            const displaySpeed = Math.round(Math.abs(speed) * 100);
            uiSpeed.innerText = displaySpeed + " MPH";
            if (displaySpeed > 80) uiSpeed.style.color = "#ff0000";
            else if (displaySpeed > 40) uiSpeed.style.color = "#ffff00";
            else uiSpeed.style.color = "#00ff00";

            // Collision Detection (Hitboxes)
            for (let i = 0; i < obstacles.length; i++) {
                // Measure distance between car and rock
                const dist = car.position.distanceTo(obstacles[i].position);
                if (dist < 3) {
                    // CRASH! Bounce the car back
                    speed = speed * -1.5; 
                    car.translateZ(speed); 
                }
            }
        }

        // 7. CHASE CAMERA LERP
        function updateCamera() {
            // Calculate a point behind and above the car
            const relativeOffset = new THREE.Vector3(0, 4, 10);
            const cameraOffset = relativeOffset.applyMatrix4(car.matrixWorld);
            
            // Smoothly move the camera to that point
            camera.position.lerp(cameraOffset, 0.1);
            
            // Look slightly ahead of the car
            const lookTarget = car.position.clone();
            lookTarget.y += 1; // Look at the roof, not the floor
            camera.lookAt(lookTarget);
        }

        // 8. MAIN GAME LOOP
        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            updateCamera();
            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start!
        animate();
    </script>
</body>
</html>
