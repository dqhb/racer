<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>racer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; user-select: none; }
        canvas { display: block; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
            padding: 30px; box-sizing: border-box; text-transform: uppercase;
        }

        #top-bar { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: auto; }
        
        .panel { background: rgba(10, 10, 20, 0.8); border: 2px solid #ec4899; padding: 15px 25px; border-radius: 8px; box-shadow: 0 0 15px rgba(236, 72, 153, 0.5); text-shadow: 0 0 5px #ec4899; }
        
        h1 { margin: 0 0 5px 0; font-size: 2rem; color: #fbcfe8; letter-spacing: 2px;}
        p { margin: 0; color: #f472b6; font-size: 0.9rem; letter-spacing: 1px;}

        #speedometer { font-size: 3.5rem; font-weight: bold; color: #38bdf8; text-shadow: 0 0 10px #38bdf8; text-align: right; }
        #speed-label { font-size: 1rem; color: #bae6fd; }

        .checkbox-container {
            margin-top: 15px; display: flex; align-items: center; gap: 10px; cursor: pointer;
            color: #ef4444; font-weight: bold; font-size: 1.1rem; text-shadow: 0 0 8px #ef4444;
        }
        .checkbox-container input { width: 20px; height: 20px; accent-color: #ef4444; cursor: pointer; }

        #controls { align-self: center; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px; border: 1px solid #333; color: #888; font-size: 0.8rem; letter-spacing: 2px; pointer-events: none; }
        .highlight { color: #fff; font-weight: bold; }
        
        #alert-text { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3.5rem; color: #facc15; font-weight: bold; font-style: italic;
            text-shadow: 0 0 20px #f59e0b; opacity: 0; transition: opacity 0.2s; pointer-events: none; text-align: center;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="top-bar">
            <div class="panel">
                <h1>racer</h1>
                <p>Distance: <span id="distance" style="color:#fff;">0</span> m</p>
                
                <label class="checkbox-container">
                    <input type="checkbox" id="obstacle-toggle">
                    OBSTACLES
                </label>
            </div>
            <div class="panel" style="border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);">
                <div id="speedometer">0</div>
                <div id="speed-label">KM/H</div>
            </div>
        </div>
        
        <div id="alert-text">DRIFTING!</div>

        <div id="controls">
            <span class="highlight">W</span> Accelerate | <span class="highlight">A/D</span> Steer | <span class="highlight">S</span> Brake | <span class="highlight">SPACE</span> Drift
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(scene.fog.color);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xff00aa, 1);
        dirLight.position.set(-100, 100, -100);
        scene.add(dirLight);
        const blueLight = new THREE.DirectionalLight(0x00aaff, 0.8);
        blueLight.position.set(100, 50, 100);
        scene.add(blueLight);

        const carGroup = new THREE.Group();
        scene.add(carGroup);

        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xec4899, roughness: 0.2, metalness: 0.8 }); 
        const blackMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
        const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x333333 });
        const glowMat = new THREE.MeshBasicMaterial({ color: 0x38bdf8 }); 

        const chassis = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 4.5), bodyMat);
        chassis.position.y = 0.4; carGroup.add(chassis);

        const nose = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.3, 1.8), bodyMat);
        nose.position.set(0, 0.25, -3.1); carGroup.add(nose);

        const fWing = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.1, 0.6), whiteMat);
        fWing.position.set(0, 0.15, -3.8); carGroup.add(fWing);

        const rWing = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.1, 0.8), whiteMat);
        rWing.position.set(0, 1.1, 1.8); carGroup.add(rWing);
        
        const rWingSupport = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.7, 0.4), blackMat);
        rWingSupport.position.set(0, 0.7, 1.8); carGroup.add(rWingSupport);

        const cockpit = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 1.2), blackMat);
        cockpit.position.set(0, 0.7, 0.2); carGroup.add(cockpit);

        const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16);
        wheelGeo.rotateZ(Math.PI / 2);
        const wheels = [];
        const wheelPositions = [ [-1.1, 0.4, -2.5], [1.1, 0.4, -2.5], [-1.1, 0.4, 1.5], [1.1, 0.4, 1.5] ];
        
        wheelPositions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, blackMat);
            wheel.position.set(...pos);
            carGroup.add(wheel);
            wheels.push(wheel);
            const rim = new THREE.Mesh(new THREE.TorusGeometry(0.25, 0.05, 8, 16), glowMat);
            rim.rotateY(Math.PI / 2);
            rim.position.set(pos[0] > 0 ? 0.16 : -0.16, 0, 0);
            wheel.add(rim);
        });

        const groundGeo = new THREE.PlaneGeometry(500, 500);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x050510, roughness: 1 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.1;
        scene.add(ground);

        const seed1 = Math.random() * 1000;
        const seed2 = Math.random() * 1000;
        let distanceTraveled = 0;
        const trackWidth = 7;

        function getTrackCenter(zOffset) {
            let globalZ = distanceTraveled - zOffset;
            return Math.sin(globalZ * 0.003 + seed1) * 25 + Math.sin(globalZ * 0.0015 + seed2) * 35;
        }

        const trackMarkers = [];
        const markerGeo = new THREE.BoxGeometry(0.4, 0.2, 4);
        const markerMat = new THREE.MeshBasicMaterial({ color: 0xec4899 }); 
        
        for (let i = 0; i < 60; i++) {
            let zPos = 10 - (i * 4);
            
            let mLeft = new THREE.Mesh(markerGeo, markerMat);
            scene.add(mLeft);
            trackMarkers.push({ mesh: mLeft, z: zPos, sideOffset: -trackWidth });

            let mRight = new THREE.Mesh(markerGeo, markerMat);
            scene.add(mRight);
            trackMarkers.push({ mesh: mRight, z: zPos, sideOffset: trackWidth });
        }

        const obstacleToggle = document.getElementById('obstacle-toggle');
        let obstacles = [];
        const obsGeo = new THREE.BoxGeometry(2, 1.5, 2);
        const obsMat = new THREE.MeshStandardMaterial({ color: 0xef4444, emissive: 0xaa0000 }); 

        const keys = { w: false, a: false, s: false, d: false, space: false };
        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; if(e.code==='Space') keys.space = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; if(e.code==='Space') keys.space = false; });

        let speed = 0;
        let maxSpeed = 3.0;
        let acceleration = 0.02;
        let friction = 0.008;
        let steeringAngle = 0;
        let carRotation = 0; 
        let crashed = false;
        
        const uiSpeed = document.getElementById('speedometer');
        const uiDist = document.getElementById('distance');
        const alertText = document.getElementById('alert-text');

        function animate() {
            requestAnimationFrame(animate);

            let currentCenter = getTrackCenter(0);
            let distFromCenter = Math.abs(carGroup.position.x - currentCenter);
            let isOffTrack = distFromCenter > trackWidth;

            if (isOffTrack && !crashed) {
                maxSpeed = 1.0;          
                friction = 0.05;         
                alertText.innerText = "OFF TRACK";
                alertText.style.color = "#ef4444";
                alertText.style.opacity = 1;
            } else if (!crashed) {
                maxSpeed = 3.0;
                friction = 0.008;
                if (!keys.space) alertText.style.opacity = 0; 
            }

            if (!crashed) {
                if (keys.w) speed += acceleration;
                else if (keys.s) speed -= acceleration * 1.5; 
                else speed -= friction; 
            } else {
                speed -= 0.05; 
            }

            let currentTurnSpeed = 0.035;
            let grip = 0.1; 

            if (keys.space && speed > 0.5 && !isOffTrack && !crashed) {
                currentTurnSpeed = 0.07; 
                grip = 0.02; 
                speed -= friction * 2; 
                alertText.innerText = "DRIFTING!";
                alertText.style.color = "#facc15";
                alertText.style.opacity = 1;
            }

            speed = Math.max(0, Math.min(speed, maxSpeed)); 

            if (speed > 0.1 && !crashed) {
                if (keys.a) carRotation += currentTurnSpeed;
                if (keys.d) carRotation -= currentTurnSpeed;
            }
            if (!keys.a && !keys.d && !crashed) carRotation *= 0.92; 
            
            if(!crashed) steeringAngle += (carRotation - steeringAngle) * grip;

            carGroup.position.x -= Math.sin(steeringAngle) * speed;
            carGroup.rotation.y = carRotation;

            wheels.forEach(w => w.rotation.x -= speed * 0.5);
            wheels[0].rotation.z = carRotation * 1.5; wheels[1].rotation.z = carRotation * 1.5;

            let zMovement = Math.cos(steeringAngle) * speed;
            distanceTraveled += zMovement;

            trackMarkers.forEach(m => {
                m.z += zMovement;
                if (m.z > 10) m.z -= 240; 
                m.mesh.position.z = m.z;
                m.mesh.position.x = getTrackCenter(m.z) + m.sideOffset; 
            });

            if (obstacleToggle.checked && !crashed) {
                if (Math.random() < 0.03 && speed > 1) {
                    let obs = new THREE.Mesh(obsGeo, obsMat);
                    let spawnZ = -200;
                    let randomOffset = (Math.random() * (trackWidth * 1.5)) - (trackWidth * 0.75); 
                    obs.position.set(getTrackCenter(spawnZ) + randomOffset, 0.75, spawnZ);
                    scene.add(obs);
                    obstacles.push({ mesh: obs, internalOffset: randomOffset });
                }
            } else if (!obstacleToggle.checked && obstacles.length > 0) {
                obstacles.forEach(o => scene.remove(o.mesh));
                obstacles = [];
                crashed = false; 
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.mesh.position.z += zMovement;
                
                obs.mesh.position.x = getTrackCenter(obs.mesh.position.z) + obs.internalOffset;

                if (!crashed &&
                    Math.abs(obs.mesh.position.z - carGroup.position.z) < 2.5 && 
                    Math.abs(obs.mesh.position.x - carGroup.position.x) < 1.5) {
                    
                    crashed = true;
                    speed = 0;
                    carRotation += Math.PI; 
                    alertText.innerText = "CRASHED!";
                    alertText.style.color = "#ef4444";
                    alertText.style.opacity = 1;
                }

                if (obs.mesh.position.z > 10) {
                    scene.remove(obs.mesh);
                    obstacles.splice(i, 1);
                }
            }

            const targetX = currentCenter; 
            const targetY = 4 + (speed * 0.5); 
            const targetZ = carGroup.position.z + 10 + (speed * 1.5);

            camera.position.x += ((carGroup.position.x * 0.5 + targetX * 0.5) - camera.position.x) * 0.1;
            camera.position.y += (targetY - camera.position.y) * 0.1;
            camera.position.z += (targetZ - camera.position.z) * 0.1;
            camera.lookAt(carGroup.position.x, carGroup.position.y, carGroup.position.z - 15);

            uiSpeed.innerText = Math.floor(speed * 110); 
            uiDist.innerText = Math.floor(distanceTraveled);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
